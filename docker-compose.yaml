services: 
  fastapi: 
    image: kamdemize/fastapi:dev  
    build: 
      context: .
      dockerfile: Dockerfile
    ports: 
      - 8888:8000

  streamlit: 
    image: kamdemize/streamlit:dev
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    ports:
      - 8501:8501
    environment: 
      API_URL: http://fastapi:8000 

